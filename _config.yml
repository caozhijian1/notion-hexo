# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site 👇 只改这4行，其余不动
title: AshonCao的博客 
subtitle: '我的个人博客' 
description: '记录生活与学习' 
keywords:
author: caozhijian 
language: zh-CN  # 保留不动
timezone: Asia/Shanghai  # 保留不动

# URL 👇 只改这1行，核心！
url: https://caozhijian.vercel.app 
permalink: :title/  # 保留不动
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory 👇 全部保留，不动
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing 👇 全部保留，不动
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting 👇 全部保留，不动
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag 👇 全部保留，不动
default_category: uncategorized
category_map:
tag_map:

# Metadata elements 👇 全部保留，不动
meta_generator: true

# Date / Time format 👇 全部保留，不动
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination 👇 全部保留，不动
per_page: 10
pagination_dir: page

# Include / Exclude 👇 全部保留，不动
include:
exclude:
ignore:

# Extensions 👇 全部保留，不动
theme: butterfly

# Deployment 👇 全部保留，不动
deploy:
  type: ''
